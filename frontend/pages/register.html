<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Explore Nepal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="auth-wrapper">
        <!-- Left: Image Panel -->
        <div class="auth-image">
            <img src="../assets/images/everest.jpg" alt="Nepal mountains">
            <div class="auth-image-overlay"></div>
            <div class="auth-image-content">
                <a href="index.html" class="auth-brand">
                    <i class="fa-solid fa-mountain"></i>
                    <span>Explore Nepal</span>
                </a>
                <h2>Start Your Journey</h2>
                <p>Create an account to discover breathtaking destinations and plan your dream trip to Nepal.</p>
            </div>
        </div>

        <!-- Right: Register Form -->
        <div class="auth-form-panel">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h1>Create Account</h1>
                    <p>Join thousands of travelers exploring Nepal</p>
                </div>

                <div class="auth-social">
                    <button class="btn-social" type="button" aria-label="Sign up with Google">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="btn-social" type="button" aria-label="Sign up with Facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>

                <div class="auth-divider">
                    <span>or sign up with email</span>
                </div>

                <form id="registerForm" novalidate>
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="fullName" name="fullName" placeholder="Your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group-inline">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-auth-submit">
                        Create Account
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <p class="auth-switch">
                    Already have an account? <a href="login.html">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
